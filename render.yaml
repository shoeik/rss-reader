services:
  - type: web
    name: rss-summary-reader
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rss-summary-reader-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: rss-summary-reader-db
    plan: basic-256mb
