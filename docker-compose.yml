services:
  postgres:
    image: postgres:16
    container_name: rss-reader-postgres
    environment:
      POSTGRES_USER: rss
      POSTGRES_PASSWORD: rss
      POSTGRES_DB: rss_reader
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rss -d rss_reader"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
